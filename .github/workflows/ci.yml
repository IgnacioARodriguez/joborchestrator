name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm
      - run: python -m pip install -r requirements.txt -r requirements-dev.txt
      - run: npm ci
      - run: python -m pytest
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
