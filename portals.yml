# Portal Scanner Configuration
# Career-ops style job discovery across multiple ATS platforms

# ============================================================
# SALARY FILTER (optional)
# ============================================================
salary_filter:
  min_salary: 50000        # Reject offers below this
  max_salary: 300000       # Reject offers above this
  currency: "USD"

tracked_companies:
  # ============================================================
  # AI LABS / LLM Companies
  # ============================================================
  - name: "Anthropic"
    careers_url: "https://www.anthropic.com/careers"
    api: "https://boards-api.greenhouse.io/v1/boards/anthropic/jobs"
    api_provider: "greenhouse"
    enabled: true

  - name: "OpenAI"
    careers_url: "https://openai.com/careers"
    api_provider: "ashby"
    enabled: true

  - name: "Mistral AI"
    careers_url: "https://mistral.ai/careers/"
    api_provider: "ashby"
    enabled: true

  - name: "Cohere"
    careers_url: "https://cohere.com/careers"
    api: "https://boards-api.greenhouse.io/v1/boards/cohere/jobs"
    api_provider: "greenhouse"
    enabled: true

  - name: "Hugging Face"
    careers_url: "https://huggingface.co/join"
    api_provider: "ashby"
    enabled: true

  # ============================================================
  # PLATOONS / DEVELOPER PLATFORMS
  # ============================================================
  - name: "Retool"
    careers_url: "https://retool.com/careers"
    api_provider: "lever"
    enabled: true

  - name: "Vercel"
    careers_url: "https://vercel.com/careers"
    api: "https://boards-api.greenhouse.io/v1/boards/vercel/jobs"
    api_provider: "greenhouse"
    enabled: true

  - name: "Stripe"
    careers_url: "https://stripe.com/jobs"
    api_provider: "lever"
    enabled: true

  - name: "Temporal"
    careers_url: "https://temporal.io/careers"
    api_provider: "lever"
    enabled: true

  # ============================================================
  # SPANISH / IBERIAN TECH
  # ============================================================
  - name: "Clarity AI"
    careers_url: "https://www.clarity.ai/jobs"
    api_provider: "greenhouse"
    enabled: true

  - name: "Tinybird"
    careers_url: "https://www.tinybird.co/careers"
    api_provider: "ashby"
    enabled: true

  - name: "n8n"
    careers_url: "https://n8n.io/careers"
    api_provider: "lever"
    enabled: true

  # ============================================================
  # GENERIC PORTALS / JOB BOARDS
  # ============================================================

search_queries:
  - query: "site:jobs.ashbyhq.com (AI Engineer OR Backend) Spain"
    enabled: true

  - query: "site:boards.greenhouse.io (Senior Backend OR Python) Spain"
    enabled: true

  - query: "site:jobs.lever.co Remote Python Europe"
    enabled: true

  - query: "site:linkedin.com/jobs (Senior Backend Developer OR AI Engineer) Madrid"
    enabled: true

title_filter:
  positive:
    - "Backend"
    - "Python"
    - "Engineer"
    - "AI"
    - "LLM"
    - "Solutions"
    - "Presales"
  negative:
    - "Sales"
    - "Marketing"
    - "HR"
    - "Legal"
  seniority_boost:
    - "Senior"
    - "Staff"
    - "Principal"

location_filter:
  allow:
    - "Spain"
    - "Madrid"
    - "Málaga"
    - "Barcelona"
    - "Remote"
    - "European Union"
    - "EU"
  block:
    - "China"
    - "Russia"
    - "Belarus"
